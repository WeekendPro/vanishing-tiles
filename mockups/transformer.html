<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vanishing Tiles — Transformer Piece mockup</title>
<style>
  /* ── Afterglow / neon-arcade aesthetic, lifted from the app ────────────── */
  :root {
    --void: #04040a;        /* board backing */
    --dim: #0c0c14;         /* resting empty cell */
    --magenta: #FF2D9B;     /* Medium-mode reveal flood */
    --cyan: #28f0ff;
    --amber: #ffc23d;
    --cell: 28px;
    --pitch: 30px;          /* 28 + 2px gap */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background:
      radial-gradient(120% 90% at 50% 0%, #0a0a16 0%, #04040a 60%, #020205 100%);
    color: #d7d9e6;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    min-height: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 16px 48px;
    gap: 14px;
  }
  .title {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--cyan); text-shadow: 0 0 10px rgba(40,240,255,0.5);
  }
  .phase {
    font-size: 11px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--magenta); text-shadow: 0 0 10px rgba(255,45,155,0.55);
    min-height: 14px;
  }

  /* The board — dark void, inline grid of 28px cells with 2px gaps. */
  .board {
    --cols: 8; --rows: 6;
    display: grid;
    grid-template-columns: repeat(var(--cols), var(--cell));
    grid-template-rows: repeat(var(--rows), var(--cell));
    gap: 2px;
    padding: 12px;
    background: var(--void);
    border-radius: 12px;
    box-shadow: inset 0 2px 6px #000, inset 0 0 0 1px rgba(255,255,255,0.03);
    position: relative;
  }
  .cell {
    width: var(--cell); height: var(--cell);
    border-radius: 4px;
    background: var(--dim);
  }

  /* ── A morphing TOKEN: 4 absolutely-positioned squares that the JS slides
        from one shape's footprint to the next. Each token square carries the
        magenta flood + glow; we animate `transform` (translate) so the cell
        migration is GPU-cheap and buttery. ───────────────────────────────── */
  .token {
    position: absolute;
    left: 12px; top: 12px;          /* board padding origin */
    pointer-events: none;
  }
  .tcell {
    position: absolute;
    width: var(--cell); height: var(--cell);
    border-radius: 4px;
    /* Transformer DEMARCATION: a magenta core with a piped CYAN RIM (a hue split
       that says "unstable"), so it reads as special vs. a flat magenta gap. */
    background: linear-gradient(160deg, #ff62b8, var(--magenta) 55%, #d61f81);
    box-shadow:
      0 0 14px var(--magenta), 0 0 30px var(--magenta),
      inset 0 0 0 1.5px rgba(40,240,255,0.95), inset 0 0 7px rgba(40,240,255,0.55);
    transition: transform 0.42s cubic-bezier(0.55, 0.0, 0.2, 1);
  }

  /* The cyan corner-bracket "containment frame" on the bounding box; the JS keeps
     it sized to the CURRENT footprint as the shape morphs. Standard gaps never
     get this. (Rendered as a single box with 4 short L-brackets via ::before.) */
  .ring {
    position: absolute;
    border-radius: 5px;
    border: 1.5px dashed rgba(40,240,255,0.85);
    box-shadow: 0 0 9px rgba(40,240,255,0.5);
    transition: transform 0.42s cubic-bezier(0.55,0,0.2,1),
                width 0.42s cubic-bezier(0.55,0,0.2,1),
                height 0.42s cubic-bezier(0.55,0,0.2,1);
    animation: ringPulse 1.2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes ringPulse {
    0%,100% { opacity: 0.55; }
    50%     { opacity: 1; }
  }

  /* The signature bloom flash (phase 1): a one-shot brightness pop + scale. */
  @keyframes bloomIn {
    0%   { background: var(--dim); box-shadow: none; transform: scale(1); }
    18%  { background: var(--magenta);
           box-shadow: 0 0 18px var(--magenta), 0 0 38px var(--magenta);
           transform: scale(1.16); }
    100% { background: var(--magenta);
           box-shadow: 0 0 14px var(--magenta), 0 0 30px var(--magenta);
           transform: scale(1); }
  }
  .tcell.bloom { animation: bloomIn 0.5s cubic-bezier(0.2,0.75,0.2,1) both; }

  /* The "flashy blink" (phase 2): a couple of hard strobe-glows that say
     "this one is special — watch it" before the morph fires. */
  @keyframes blink {
    0%, 100%   { filter: brightness(1);   box-shadow: 0 0 14px var(--magenta), 0 0 30px var(--magenta); }
    50%        { filter: brightness(2.4); box-shadow: 0 0 22px #fff, 0 0 48px var(--magenta); }
  }
  .tcell.blink { animation: blink 0.16s steps(1,end) 3; }

  /* During the migrate (phase 3) each cell does a little "bubble" squash so the
     reshuffle feels liquid, not mechanical. */
  @keyframes bubble {
    0%   { transform: scale(1); }
    40%  { transform: scale(0.82) ; filter: brightness(1.5); }
    100% { transform: scale(1); }
  }
  .tcell.bubble { animation: bubble 0.42s ease-in-out; }

  /* Decay-to-void: after the morph settles, the token fades back to the void in
     the per-cell wave that mirrors vtBloom — leaving NO readable hole. */
  @keyframes decay {
    0%   { background: var(--magenta); box-shadow: 0 0 14px var(--magenta), 0 0 30px var(--magenta); opacity: 1; }
    60%  { background: color-mix(in srgb, var(--magenta) 40%, var(--dim)); box-shadow: 0 0 6px rgba(255,45,155,0.4); }
    100% { background: var(--dim); box-shadow: none; opacity: 1; }
  }
  .tcell.decay { animation: decay var(--decay-ms,1s) cubic-bezier(0.2,0.75,0.2,1) forwards; }

  .legend {
    margin-top: 6px; font-size: 10px; letter-spacing: 0.06em;
    color: #6b6e82; text-align: center; line-height: 1.6; max-width: 360px;
  }
  .legend b { color: var(--cyan); font-weight: 600; }
  .controls { display: flex; gap: 8px; margin-top: 8px; }
  button {
    font: inherit; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--cyan); background: rgba(40,240,255,0.06);
    border: 1px solid rgba(40,240,255,0.4); border-radius: 6px;
    padding: 8px 14px; cursor: pointer;
  }
  button:hover { background: rgba(40,240,255,0.14); }
  .speed { color: var(--amber); border-color: rgba(255,194,61,0.4); background: rgba(255,194,61,0.06); }
</style>
</head>
<body>
  <div class="stage">
    <div class="title">Vanishing Tiles · Transformer Piece</div>
    <div class="phase" id="phase">MEMORIZE — MEDIUM</div>
    <div class="board" id="board"></div>
    <div class="legend" id="legend"></div>
    <div class="controls">
      <button id="replay">Replay reveal</button>
      <button id="slow" class="speed">Slow-mo ½×</button>
    </div>
  </div>

<script>
/* ── Shape footprints, all expressed on a shared 3-wide × 2-tall window so the
   4 cells can migrate 1:1 between any two shapes (every tetromino is 4 cells —
   that's the whole premise). Coords are [row, col]; the morph maps each cell of
   A to its NEAREST cell in B (greedy) so the migration looks like a slide, not a
   teleport. ──────────────────────────────────────────────────────────────── */
const SHAPES = {
  L: [[0,2],[1,0],[1,1],[1,2]],   // L lying down
  O: [[0,0],[0,1],[1,0],[1,1]],   // square
  S: [[0,1],[0,2],[1,0],[1,1]],   // S
  T: [[0,0],[0,1],[0,2],[1,1]],   // T
  J: [[0,0],[1,0],[1,1],[1,2]],   // J
};

/* The morph CHAIN the demo plays through (A→B→C…), placed at this anchor on the
   8×6 board. Anchor is the top-left cell of the 3×2 window. */
const ANCHOR = [2, 2];          // row 2, col 2
const CHAIN = ['L', 'O', 'S'];  // L slides into O, O into S

const PITCH = 30;               // px per grid step (28 cell + 2 gap)

/* Greedy nearest-neighbour pairing of footprint A → footprint B so each of the
   4 physical squares travels the SHORTEST path to its new home. Returns, for the
   i-th square currently sitting on A[i], the target cell in B. */
function pairCells(from, to) {
  const targets = to.map(c => c.slice());
  const used = new Array(targets.length).fill(false);
  return from.map(src => {
    let best = -1, bestD = Infinity;
    targets.forEach((t, j) => {
      if (used[j]) return;
      const d = (t[0]-src[0])**2 + (t[1]-src[1])**2;
      if (d < bestD) { bestD = d; best = j; }
    });
    used[best] = true;
    return targets[best];
  });
}

const board = document.getElementById('board');
const phaseEl = document.getElementById('phase');
const legendEl = document.getElementById('legend');
let SPEED = 1;

// Build the static 8×6 board of resting cells.
const COLS = 8, ROWS = 6;
for (let i = 0; i < COLS * ROWS; i++) {
  const d = document.createElement('div');
  d.className = 'cell';
  board.appendChild(d);
}

// The token layer: 4 migrating squares + ONE bounding-box demarcation frame.
const token = document.createElement('div');
token.className = 'token';
board.appendChild(token);
const squares = [];
for (let i = 0; i < 4; i++) {
  const s = document.createElement('div'); s.className = 'tcell'; token.appendChild(s); squares.push(s);
}
const frame = document.createElement('div');
frame.className = 'ring'; frame.style.opacity = '0';
token.appendChild(frame);
const rings = [frame];   // kept as an array so the existing reset loops still work

function place(el, cell) {
  const [r, c] = cell;
  el.style.transform =
    `translate(${(ANCHOR[1]+c)*PITCH}px, ${(ANCHOR[0]+r)*PITCH}px)`;
}

/* Size + position the single bracket frame to a footprint's bounding box. */
function placeFrame(shape) {
  const rs = shape.map(c => c[0]), cs = shape.map(c => c[1]);
  const minR = Math.min(...rs), maxR = Math.max(...rs);
  const minC = Math.min(...cs), maxC = Math.max(...cs);
  frame.style.width  = ((maxC - minC + 1) * PITCH - 2 + 6) + 'px';
  frame.style.height = ((maxR - minR + 1) * PITCH - 2 + 6) + 'px';
  frame.style.transform =
    `translate(${(ANCHOR[1]+minC)*PITCH - 3}px, ${(ANCHOR[0]+minR)*PITCH - 3}px)`;
}

const wait = ms => new Promise(res => setTimeout(res, ms / SPEED));

legendEl.innerHTML =
  'A <b>Transformer</b> gap (dashed cyan ring = "unstable") blooms as one shape, ' +
  'gives a flashy blink, then its 4 cells <b>bubble-slide</b> into the next shape. ' +
  'Chain: <b>L → O → S</b>. Recall rule: pick the <b>FINAL</b> resting shape.';

async function runReveal() {
  // Reset: park the 4 squares + rings on the first shape, dim, hidden.
  const first = SHAPES[CHAIN[0]];
  squares.forEach((s, i) => {
    s.className = 'tcell';
    s.style.transition = 'none';
    s.style.background = 'var(--dim)'; s.style.boxShadow = 'none'; s.style.opacity = '1';
    place(s, first[i]);
  });
  frame.style.transition='none'; frame.style.opacity = '0'; placeFrame(first);
  // force reflow so the "none" transition lands before we re-enable
  void board.offsetWidth;
  squares.forEach(s => s.style.transition = '');
  frame.style.transition = '';

  await wait(350);

  // ── PHASE 1 — bloom in (the standard bright appearance) ─────────────────
  phaseEl.textContent = 'TRANSFORMER · APPEAR';
  squares.forEach((s, i) => {
    s.classList.add('bloom');
    s.style.animationDelay = (i * 40 / SPEED) + 'ms';
  });
  // Demarcation frame fades up to announce "this gap is special".
  frame.style.opacity = '1';
  await wait(560);
  squares.forEach(s => { s.classList.remove('bloom'); s.style.animationDelay=''; });

  // ── PHASE 2 — flashy blink (a strobe that says "watch me") ──────────────
  phaseEl.textContent = 'TRANSFORMER · UNSTABLE';
  squares.forEach(s => s.classList.add('blink'));
  await wait(540);
  squares.forEach(s => s.classList.remove('blink'));
  await wait(120);

  // ── PHASE 3 — bubble-morph through the chain, cell by cell ──────────────
  let cur = first;
  for (let step = 1; step < CHAIN.length; step++) {
    const next = SHAPES[CHAIN[step]];
    const pairs = pairCells(cur, next);
    phaseEl.textContent = `TRANSFORMER · ${CHAIN[step-1]} → ${CHAIN[step]}`;
    squares.forEach((s, i) => {
      // staggered per-cell delay = the "bubbly" cascade
      const delay = (i * 70 / SPEED);
      s.style.transitionDelay = delay + 'ms';
      s.classList.add('bubble');
      s.style.animationDelay = delay + 'ms';
      place(s, pairs[i]);
    });
    placeFrame(next);   // bracket frame eases to the new footprint's bounding box
    await wait(420 + 70 * 3 + 120);
    squares.forEach(s => { s.classList.remove('bubble'); s.style.transitionDelay=''; s.style.animationDelay=''; });
    cur = next;
    await wait(220);
  }

  // Settle a beat on the FINAL shape (this is what the player must recall).
  phaseEl.textContent = `TRANSFORMER · RECALL: ${CHAIN[CHAIN.length-1]}`;
  await wait(700);

  // ── DECAY — fade back to the void in a per-cell wave (no readable hole) ──
  frame.style.opacity = '0';
  squares.forEach((s, i) => {
    s.style.setProperty('--decay-ms', (900) + 'ms');
    s.style.animationDelay = (i * 110 / SPEED) + 'ms';
    s.classList.add('decay');
  });
  await wait(900 + 110 * 3 + 200);
  squares.forEach(s => { s.classList.remove('decay'); s.style.animationDelay=''; });
  phaseEl.textContent = 'MEMORIZE — MEDIUM';
}

document.getElementById('replay').onclick = () => runReveal();
document.getElementById('slow').onclick = (e) => {
  SPEED = SPEED === 1 ? 0.5 : 1;
  e.target.textContent = SPEED === 1 ? 'Slow-mo ½×' : 'Normal 1×';
};

// Expose deterministic phase-stepping for the screenshot driver.
window.__SHAPES = SHAPES; window.__CHAIN = CHAIN; window.__ANCHOR = ANCHOR;
window.__PITCH = PITCH; window.__squares = squares; window.__frame = frame;
window.__place = place; window.__placeFrame = placeFrame; window.__pairCells = pairCells;
window.__setPhase = t => phaseEl.textContent = t;
window.__runReveal = runReveal;
runReveal();
</script>
</body>
</html>

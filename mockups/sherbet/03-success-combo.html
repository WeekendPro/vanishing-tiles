<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sherbet · Perfect!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --vt-bg:#FFF7F0; --vt-surface:#FFFFFF; --vt-surface-2:#FFF1E8; --vt-hairline:#F0E0D4;
  --vt-ink:#46383B; --vt-ink-soft:#9B8B8E; --vt-success:#2FD09B; --vt-star:#FFCE3A;
  --vt-combo-a:#FF6B6B; --vt-combo-b:#FFA94D; --vt-life:#FF6B81;
  --vt-shadow-2:0 6px 14px rgba(217,150,120,.22); --vt-shadow-3:0 14px 30px rgba(214,140,110,.26);
  --vt-inset-top:inset 0 2px 0 rgba(255,255,255,.6); --vt-spring:cubic-bezier(.18,1.3,.4,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#EFE4DA;font-family:'Nunito',sans-serif;color:var(--vt-ink);
  min-height:100vh;display:grid;place-items:center;padding:20px}
.phone{width:390px;max-width:100%;border-radius:42px;box-shadow:var(--vt-shadow-3);
  padding:0;position:relative;overflow:hidden;
  background:radial-gradient(120% 80% at 50% 0%,#FFF4E9 0%,#FFEFE0 55%,#FFE8D6 100%)}
.confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.conf{position:absolute;width:10px;height:14px;border-radius:3px;top:-20px;
  animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-20px) rotate(0)}100%{transform:translateY(740px) rotate(540deg)}}

.wrap{position:relative;z-index:2;padding:54px 26px 30px;text-align:center;
  display:flex;flex-direction:column;align-items:center;min-height:660px;justify-content:center}

/* big sherbet badge */
.badge{width:118px;height:118px;border-radius:34px;display:grid;place-items:center;font-size:56px;
  background:linear-gradient(160deg,#FFE07A,#FFCE3A);box-shadow:var(--vt-shadow-3),var(--vt-inset-top);
  margin-bottom:22px;animation:badgePop .6s var(--vt-spring) both}
@keyframes badgePop{0%{transform:scale(0) rotate(-12deg)}60%{transform:scale(1.14) rotate(4deg)}100%{transform:scale(1) rotate(0)}}

.title{font-family:'Fredoka';font-weight:700;font-size:38px;margin:0 0 6px;
  background:linear-gradient(90deg,var(--vt-combo-a),var(--vt-combo-b));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:rise .5s var(--vt-spring) .12s both}
.sub{color:var(--vt-ink-soft);font-weight:600;font-size:16px;margin:0 0 22px;animation:rise .5s var(--vt-spring) .2s both}
@keyframes rise{0%{transform:translateY(14px);opacity:0}100%{transform:translateY(0);opacity:1}}

/* combo multiplier */
.combo{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;border-radius:999px;
  background:#fff;box-shadow:var(--vt-shadow-2),var(--vt-inset-top);margin-bottom:26px;
  animation:rise .5s var(--vt-spring) .28s both}
.combo .lab{font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--vt-ink-soft)}
.combo .mult{font-family:'Fredoka';font-weight:700;font-size:30px;line-height:1;
  background:linear-gradient(90deg,var(--vt-combo-a),var(--vt-combo-b));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:bump 1.4s ease-in-out infinite}
@keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.spark{font-size:20px;animation:twinkle 1.2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.5;transform:scale(.8) rotate(0)}50%{opacity:1;transform:scale(1.2) rotate(20deg)}}

/* score card */
.card{width:100%;background:#fff;border-radius:28px;box-shadow:var(--vt-shadow-3);
  padding:22px;animation:rise .5s var(--vt-spring) .36s both}
.scoreline{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-bottom:4px}
.scoreline .n{font-family:'Fredoka';font-weight:700;font-size:46px;font-variant-numeric:tabular-nums}
.scoreline .plus{font-family:'Fredoka';font-weight:600;font-size:20px;color:var(--vt-success)}
.scaption{font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--vt-ink-soft)}
.stars{display:flex;justify-content:center;gap:8px;margin:16px 0 4px}
.star{width:30px;height:30px;color:var(--vt-star)}
.star.off{color:#F0E2D2}
.star:nth-child(1){animation:starPop .45s var(--vt-spring) .5s both}
.star:nth-child(2){animation:starPop .45s var(--vt-spring) .6s both}
.star:nth-child(3){animation:starPop .45s var(--vt-spring) .7s both}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}100%{transform:scale(1) rotate(0)}}

.btns{width:100%;display:flex;flex-direction:column;gap:12px;margin-top:24px;
  animation:rise .5s var(--vt-spring) .46s both}
.btn{font-family:'Fredoka';font-weight:600;font-size:18px;border:none;padding:16px 0;border-radius:999px;
  box-shadow:var(--vt-shadow-2),var(--vt-inset-top);cursor:pointer}
.btn.primary{color:#fff;background:linear-gradient(180deg,#43E0AB,#2FD09B)}
.btn.secondary{color:var(--vt-ink);background:#fff;border:1.5px solid var(--vt-hairline)}
.btn:active{transform:scale(.96)}
</style>
</head>
<body>
<div class="phone">
  <div class="confetti" id="confetti"></div>
  <div class="wrap">
    <div class="badge">🍬</div>
    <h1 class="title">Perfect!</h1>
    <p class="sub">Every tile remembered — sweet run!</p>

    <div class="combo">
      <span class="lab">Combo</span>
      <span class="mult">×4</span>
      <span class="spark">✨</span>
    </div>

    <div class="card">
      <div class="scoreline"><span class="n">1,560</span><span class="plus">+420</span></div>
      <div class="scaption">round score</div>
      <div class="stars">
        <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4l1.5-6.8L2.2 9l6.9-.7z"/></svg>
        <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4l1.5-6.8L2.2 9l6.9-.7z"/></svg>
        <svg class="star off" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.2 4.6 1.5 6.8L12 17.8 5.9 20.4l1.5-6.8L2.2 9l6.9-.7z"/></svg>
      </div>
    </div>

    <div class="btns">
      <button class="btn primary">Next round →</button>
      <button class="btn secondary">Home</button>
    </div>
  </div>
</div>

<script>
const C=['#FF6B6B','#FF9E45','#FFCE3A','#5BC16E','#1FC7B6','#46AEF7','#9B8CFF','#FF8FCF'];
const cf=document.getElementById('confetti');
for(let i=0;i<26;i++){
  const d=document.createElement('div'); d.className='conf';
  d.style.left=(Math.random()*100)+'%';
  d.style.background=C[i%C.length];
  d.style.animationDuration=(2.4+Math.random()*1.8)+'s';
  d.style.animationDelay=(-Math.random()*3)+'s';
  d.style.opacity=.85;
  if(i%3===0) d.style.borderRadius='999px';
  cf.appendChild(d);
}
</script>
</body>
</html>

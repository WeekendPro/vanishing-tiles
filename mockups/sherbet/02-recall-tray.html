<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sherbet · Recall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --vt-bg:#FFF7F0; --vt-bg-board:#FBEFE6; --vt-surface:#FFFFFF; --vt-surface-2:#FFF1E8;
  --vt-hairline:#F0E0D4; --vt-ink:#46383B; --vt-ink-soft:#9B8B8E; --vt-ink-faint:#CDBFC1;
  --vt-life:#FF6B81; --vt-success:#2FD09B; --vt-star:#FFCE3A;
  --vt-combo-a:#FF6B6B; --vt-combo-b:#FFA94D; --vt-timer-warn:#FFB13C; --vt-timer-hot:#FF8A5B;
  --vt-shadow-2:0 6px 14px rgba(217,150,120,.22); --vt-shadow-3:0 14px 30px rgba(214,140,110,.26);
  --vt-inset-top:inset 0 2px 0 rgba(255,255,255,.6);
  --vt-r-tile:22px; --vt-r-card:28px; --vt-spring:cubic-bezier(.18,1.3,.4,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:#EFE4DA;font-family:'Nunito',sans-serif;color:var(--vt-ink);
  min-height:100vh;display:grid;place-items:center;padding:20px}
.phone{width:390px;max-width:100%;background:var(--vt-bg);border-radius:42px;
  box-shadow:var(--vt-shadow-3);padding:18px 16px 22px;position:relative;overflow:hidden}
.hud{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 4px 12px}
.score{font-family:'Fredoka';font-weight:600;font-size:22px;font-variant-numeric:tabular-nums;
  display:flex;align-items:baseline;gap:6px}
.score small{font-family:'Nunito';font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--vt-ink-soft)}
.lvl-pill{font-family:'Fredoka';font-weight:600;font-size:14px;background:var(--vt-surface);
  padding:6px 14px;border-radius:999px;box-shadow:var(--vt-shadow-2),var(--vt-inset-top)}
.lives{display:flex;gap:5px}
.heart{width:20px;height:20px;color:var(--vt-life);filter:drop-shadow(0 2px 2px rgba(255,107,129,.4))}

/* combo + timer */
.row{display:flex;align-items:center;gap:10px;margin:2px 6px 14px}
.combo{font-family:'Fredoka';font-weight:600;font-size:15px;
  background:linear-gradient(90deg,var(--vt-combo-a),var(--vt-combo-b));
  -webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
.combo .x{font-size:19px}
.cmeter{flex:1;height:10px;border-radius:999px;background:var(--vt-surface-2);overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.06)}
.cmeter i{display:block;height:100%;width:68%;border-radius:999px;
  background:linear-gradient(90deg,var(--vt-combo-a),var(--vt-combo-b))}
.clock{font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--vt-timer-hot);
  display:flex;align-items:center;gap:5px}
.ring{width:18px;height:18px;border-radius:999px;
  background:conic-gradient(var(--vt-timer-hot) 230deg,#F3E2D6 0);}

/* board (tiles gone, recalling) */
.board{background:var(--vt-bg-board);border-radius:26px;padding:14px;
  box-shadow:inset 0 2px 8px rgba(180,120,90,.14);
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.slot{aspect-ratio:1;border-radius:var(--vt-r-tile);background:var(--vt-surface-2);
  border:1px solid var(--vt-hairline);position:relative;display:grid;place-items:center;font-size:30px}
.slot.filled{background:#FFFDFB;box-shadow:var(--vt-shadow-2),var(--vt-inset-top);
  animation:reBloom .5s var(--vt-spring) both}
.slot.filled.swatch{background:var(--c)}
.slot.filled.swatch::after{content:"";position:absolute;inset:7px;border-radius:14px;border:3px solid var(--rim)}
.check{position:absolute;right:-4px;top:-4px;width:22px;height:22px;border-radius:999px;
  background:var(--vt-success);display:grid;place-items:center;box-shadow:0 2px 6px rgba(47,208,155,.5);
  animation:pop .4s var(--vt-spring) .12s both}
.check svg{width:13px;height:13px;color:#fff}
@keyframes reBloom{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}

/* recall tray */
.tray{margin-top:18px;background:var(--vt-surface);border-radius:var(--vt-r-card);
  box-shadow:var(--vt-shadow-3);padding:16px 14px 18px}
.tray h4{margin:0 0 12px;text-align:center;font-family:'Nunito';font-weight:700;font-size:12px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--vt-ink-soft)}
.cands{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.cand{aspect-ratio:1;border-radius:18px;background:#FFFDFB;display:grid;place-items:center;
  font-size:26px;box-shadow:var(--vt-shadow-2),var(--vt-inset-top);cursor:pointer;position:relative}
.cand.swatch{background:var(--c)}
.cand.swatch::after{content:"";position:absolute;inset:6px;border-radius:12px;border:3px solid var(--rim)}
.cand.shape .g{width:54%;height:54%}
.cand:active{transform:scale(.92)}
.cand.picked{animation:tap .5s var(--vt-spring) both;outline:3px solid var(--vt-success);
  outline-offset:2px;box-shadow:var(--vt-shadow-2),var(--vt-inset-top),0 0 0 6px rgba(47,208,155,.22)}
.cand.miss{animation:shake .42s ease both}
@keyframes tap{0%{transform:scale(.92)}55%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}
  40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(2px)}}
.hint{text-align:center;color:var(--vt-ink-soft);font-size:13px;font-weight:600;margin-top:14px}
.hint b{color:var(--vt-success)}
</style>
</head>
<body>
<div class="phone">
  <div class="hud">
    <div class="score">1,560<small>pts</small></div>
    <div class="lvl-pill">Level 7</div>
    <div class="lives">
      <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.3-9C1 8.5 2.6 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.4 0 5 3.5 3.3 7C19 16.4 12 21 12 21z"/></svg>
      <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.3-9C1 8.5 2.6 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.4 0 5 3.5 3.3 7C19 16.4 12 21 12 21z"/></svg>
      <svg class="heart" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.3-9C1 8.5 2.6 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.4 0 5 3.5 3.3 7C19 16.4 12 21 12 21z"/></svg>
    </div>
  </div>

  <div class="row">
    <div class="combo">Combo <span class="x">×3</span></div>
    <div class="cmeter"><i></i></div>
    <div class="clock"><span class="ring"></span>0:06</div>
  </div>

  <div class="board" id="board"></div>

  <div class="tray">
    <h4>Tap the tiles you saw</h4>
    <div class="cands" id="cands"></div>
  </div>

  <div class="hint">Two found — <b>nice eye!</b> Keep the streak going…</div>
</div>

<script>
const COLORS={strawberry:['#FF6B6B','#E84F58'],sky:['#46AEF7','#2E92DD'],lime:['#5BC16E','#45A857'],
  grape:['#9B8CFF','#7E6DF0'],lemon:['#FFCE3A','#EDB31F'],tangerine:['#FF9E45','#E8842F']};
// board: two slots already recalled (filled), rest empty
const filled=[{i:2,kind:'emoji',c:'🍓'},{i:8,kind:'swatch',col:'sky'}];
const board=document.getElementById('board');
for(let s=0;s<36;s++){
  const slot=document.createElement('div'); slot.className='slot';
  const f=filled.find(x=>x.i===s);
  if(f){ slot.classList.add('filled');
    if(f.kind==='emoji') slot.textContent=f.c;
    if(f.kind==='swatch'){ slot.classList.add('swatch');
      slot.style.setProperty('--c',COLORS[f.col][0]); slot.style.setProperty('--rim',COLORS[f.col][1]); }
    const ck=document.createElement('div'); ck.className='check';
    ck.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
    slot.appendChild(ck);
  }
  board.appendChild(slot);
}
// tray: 5 candidates; one shown mid-correct-pick
const cands=[
  {kind:'emoji',c:'🌸'},
  {kind:'emoji',c:'🍋', picked:true},
  {kind:'swatch',col:'lime'},
  {kind:'shape',col:'grape',sh:'50%'},
  {kind:'emoji',c:'🐳'},
];
const wrap=document.getElementById('cands');
cands.forEach(c=>{
  const el=document.createElement('div'); el.className='cand';
  if(c.kind==='emoji') el.textContent=c.c;
  if(c.kind==='swatch'){ el.classList.add('swatch');
    el.style.setProperty('--c',COLORS[c.col][0]); el.style.setProperty('--rim',COLORS[c.col][1]); }
  if(c.kind==='shape'){ el.classList.add('shape');
    const g=document.createElement('div'); g.className='g';
    g.style.background=COLORS[c.col][0]; g.style.borderRadius=c.sh; el.appendChild(g); }
  if(c.picked) el.classList.add('picked');
  el.addEventListener('click',()=>{
    el.classList.remove('picked','miss');void el.offsetWidth;
    el.classList.add(c.kind==='emoji'&&c.c==='🐳'?'miss':'picked');
  });
  wrap.appendChild(el);
});
</script>
</body>
</html>

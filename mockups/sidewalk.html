<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gap City — Sidewalk map concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#06080f; --panel:#0d1322; --edge:#1d273f; --ink:#e6ecff; --dim:#7c8bb0; }
  *{box-sizing:border-box}
  html,body{margin:0;background:#04060c;color:var(--ink);font-family:Inter,system-ui,sans-serif}
  body{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:18px 12px 40px}

  /* ---------- control deck ---------- */
  .deck{width:100%;max-width:760px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--edge);border-radius:999px;padding:4px;gap:2px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--dim);font:inherit;font-weight:700;font-size:12px;
    padding:7px 14px;border-radius:999px;cursor:pointer;letter-spacing:.02em}
  .seg button.on{background:linear-gradient(180deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 0 14px rgba(37,99,235,.55)}
  .seg .lbl{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.12em;align-self:center;padding:0 8px 0 4px}

  /* ---------- phone frame ---------- */
  .phone{width:420px;max-width:100%;height:760px;border-radius:30px;border:1px solid var(--edge);
    background:var(--bg);overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .topbar{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;
    position:relative;z-index:5;background:linear-gradient(to bottom,#06080f,transparent)}
  .wordmark{font-weight:800;letter-spacing:.14em;font-size:13px;color:#cdd9ff}
  .keychip{font-size:10px;font-weight:700;color:#fde68a;background:rgba(251,191,36,.12);
    border:1px solid rgba(251,191,36,.35);border-radius:999px;padding:4px 9px;display:flex;gap:5px;align-items:center}
  .stage{position:absolute;inset:46px 0 0 0;overflow:hidden}
  .caption{position:absolute;left:0;right:0;bottom:0;z-index:8;text-align:center;font-size:10px;color:var(--dim);
    padding:6px;background:linear-gradient(to top,#04060c,transparent)}

  /* ---------- night sky ---------- */
  .neon-sky{position:absolute;inset:0;background:
    radial-gradient(130% 90% at 50% -15%, #1a2c5c 0%, #0c1530 42%, #05080f 100%)}
  .stars{position:absolute;inset:0;opacity:.55;background-image:
    radial-gradient(1px 1px at 18% 22%,#fff,transparent),
    radial-gradient(1px 1px at 72% 12%,#cfe,transparent),
    radial-gradient(1px 1px at 86% 32%,#fff,transparent),
    radial-gradient(1px 1px at 33% 9%,#bdf,transparent),
    radial-gradient(1px 1px at 56% 26%,#fff,transparent)}
  .moon{position:absolute;top:20px;right:34px;width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fdf6e3,#cdd3c0);box-shadow:0 0 30px rgba(253,246,227,.4)}

  /* ===========================================================
     FACADE — a real residential tower
     =========================================================== */
  .facade-scroll{position:absolute;inset:0;overflow-y:auto;scroll-behavior:smooth;padding:0 0 150px}
  .facade-scroll::-webkit-scrollbar{width:0}
  .nameplate{position:absolute;top:0;left:0;right:0;z-index:6;text-align:center;padding:10px 0 14px;
    background:linear-gradient(to bottom,#05080f 55%,transparent)}
  .nameplate .name{font-weight:800;font-size:17px;letter-spacing:.16em;color:#fff;
    text-shadow:0 0 8px var(--accent),0 0 20px var(--accent)}
  .nameplate .sub{font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:.1em;text-transform:uppercase}

  .building{width:300px;margin:46px auto 0;position:relative;
    filter:drop-shadow(0 0 40px rgba(0,0,0,.7))}

  /* rooftop */
  .roof{height:38px;position:relative;background:linear-gradient(180deg,#0e1730,#0a1124);
    border:2px solid #1b2747;border-bottom:0;border-radius:10px 10px 0 0;margin:0 6px}
  .roof::before{content:"";position:absolute;left:18px;right:18px;top:-9px;height:9px;
    background:#0c1424;border:2px solid #1b2747;border-bottom:0;border-radius:4px 4px 0 0}
  .roof .antenna{position:absolute;left:50%;top:-30px;width:2px;height:22px;background:#2a3a5e;transform:translateX(-50%)}
  .roof .antenna::after{content:"";position:absolute;top:-4px;left:-2px;width:6px;height:6px;border-radius:50%;
    background:#ff5a5a;box-shadow:0 0 8px #ff5a5a;animation:blink 1.6s steps(1) infinite}
  @keyframes blink{0%,60%{opacity:1}61%,100%{opacity:.15}}

  /* facade body holds floors */
  .tower{background:linear-gradient(180deg,#0b1226,#0a1020);border:2px solid #1b2747;border-top:0;border-bottom:0;
    padding:0;overflow:hidden}

  .floor{position:relative;display:flex;align-items:center;gap:0;height:56px;border-top:1px solid rgba(255,255,255,.04)}
  .floor:first-child{border-top:0}
  .ledge{width:34px;flex:0 0 34px;align-self:stretch;display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:800;color:#46577d;font-variant-numeric:tabular-nums;
    background:rgba(0,0,0,.25);border-right:1px solid rgba(255,255,255,.04)}
  .winrow{flex:1;display:flex;gap:14px;padding:0 18px;height:100%;align-items:center}
  .win{flex:1;height:34px;border-radius:2px;position:relative;background:#0a1326;
    border:1px solid #060b18;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
  /* window mullions (panes) */
  .win::before{content:"";position:absolute;inset:0;
    background:linear-gradient(#0000,#0000) ,
      linear-gradient(90deg,transparent calc(50% - .5px),rgba(0,0,0,.5) calc(50% - .5px),rgba(0,0,0,.5) calc(50% + .5px),transparent calc(50% + .5px)),
      linear-gradient(180deg,transparent calc(50% - .5px),rgba(0,0,0,.5) calc(50% - .5px),rgba(0,0,0,.5) calc(50% + .5px),transparent calc(50% + .5px))}

  /* OFF — dark glass with faint sky reflection */
  .floor.locked .win{background:linear-gradient(150deg,#0d1830 0%,#0a1326 55%,#0c122 100%)}

  /* ON — warm interior light */
  .floor.done .win{background:
    radial-gradient(120% 90% at 50% 35%, #fff3cf 0%, #ffd98a 45%, #f4b65e 100%);
    box-shadow:0 0 12px 1px rgba(255,196,92,.55), inset 0 0 6px rgba(255,150,40,.5)}
  .floor.done .win.dimwin{background:radial-gradient(120% 90% at 50% 40%,#ffe6b0,#e89b46);
    box-shadow:0 0 8px rgba(255,170,70,.4),inset 0 0 5px rgba(200,110,30,.5)}
  .floor.done .win.coolwin{background:radial-gradient(120% 90% at 50% 40%,#eaf4ff,#9fc3ff);
    box-shadow:0 0 10px rgba(150,190,255,.4),inset 0 0 5px rgba(80,130,220,.5)}
  .floor.done .win.offwin{background:linear-gradient(150deg,#0d1830,#0a1326);box-shadow:none}

  .floor.done{background:linear-gradient(90deg,rgba(255,180,80,.05),transparent)}

  /* CURRENT — the floor you're on */
  .floor.current{background:rgba(255,255,255,.03)}
  .floor.current .ledge{color:#fff;background:var(--accent);text-shadow:0 0 4px rgba(0,0,0,.4)}
  .floor.current .win{background:
    radial-gradient(120% 90% at 50% 35%, #ffffff 0%, color-mix(in srgb,var(--accent) 70%,#fff) 60%, var(--accent) 100%);
    box-shadow:0 0 16px 2px var(--accent),inset 0 0 6px rgba(255,255,255,.6);animation:lamppulse 2s ease-in-out infinite}
  @keyframes lamppulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
  .floor.current::after{content:"▶ PLAY";position:absolute;right:-8px;top:50%;transform:translateY(-50%);
    background:var(--accent);color:#04060c;font-size:9px;font-weight:800;letter-spacing:.08em;
    padding:4px 9px;border-radius:999px;box-shadow:0 0 14px -2px var(--accent)}

  .keyflag{position:absolute;left:40px;top:-9px;z-index:3;font-size:9px;font-weight:800;color:#04060c;
    background:#fde68a;border-radius:999px;padding:3px 8px;letter-spacing:.04em;box-shadow:0 0 12px rgba(251,191,36,.5)}

  /* street-level lobby */
  .lobby{height:74px;margin:0 6px;position:relative;background:linear-gradient(180deg,#0c1326,#070c18);
    border:2px solid #1b2747;border-top:1px solid rgba(255,255,255,.05);border-radius:0 0 8px 8px;
    display:flex;align-items:flex-end;justify-content:center}
  .door{width:54px;height:50px;background:linear-gradient(180deg,#fff3cf,#f4b65e);border-radius:6px 6px 0 0;
    box-shadow:0 0 22px rgba(255,196,92,.6);position:relative;border:2px solid #2a3354;border-bottom:0}
  .door::after{content:"";position:absolute;left:50%;top:6px;bottom:0;width:1.5px;background:rgba(120,70,20,.5)}
  .awning{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:120px;height:14px;
    background:repeating-linear-gradient(90deg,var(--accent) 0 10px,#0c1326 10px 20px);border-radius:4px;opacity:.85}
  .streetline{position:absolute;left:0;right:0;bottom:-2px;height:2px;background:linear-gradient(90deg,transparent,#33415f,transparent)}

  /* ===========================================================
     ELEVATOR
     =========================================================== */
  .elev{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .elev .name{font-weight:800;font-size:16px;letter-spacing:.16em;color:#fff;
    text-shadow:0 0 10px var(--accent),0 0 26px var(--accent);margin-bottom:4px}
  .elev .sub{font-size:10px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:22px}
  .panel{width:236px;border-radius:18px;border:1px solid var(--edge);background:linear-gradient(180deg,#0e1426,#080d1a);
    padding:20px 18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 20px 40px rgba(0,0,0,.5)}
  .readout{display:flex;align-items:center;justify-content:center;gap:14px}
  .readout .big{font-weight:800;font-size:70px;line-height:1;color:#fff;text-shadow:0 0 18px var(--accent);font-variant-numeric:tabular-nums}
  .readout .of{font-size:12px;color:var(--dim);align-self:flex-end;margin-bottom:10px}
  .floorword{font-size:11px;color:var(--accent);letter-spacing:.3em;text-transform:uppercase;text-align:center;margin-top:4px}
  .ladder{margin-top:18px;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--dim);font-size:12px;font-weight:700}
  .ladder .lrow{display:flex;align-items:center;gap:8px;opacity:.45}
  .ladder .lrow.cur{opacity:1;color:#fff;font-size:15px}
  .ladder .chev{color:var(--accent)}
  .progressmeter{margin-top:18px;width:100%;height:6px;border-radius:6px;background:#0c1326;overflow:hidden}
  .progressmeter i{display:block;height:100%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .strip{display:flex;justify-content:center;flex-wrap:wrap;gap:5px;margin-top:16px;max-width:200px}
  .dot{width:9px;height:9px;border-radius:2px;background:#16203a}
  .dot.done{background:#ffd98a;box-shadow:0 0 7px rgba(255,196,92,.6)}
  .dot.cur{background:var(--accent);box-shadow:0 0 9px var(--accent);transform:scale(1.3)}

  /* ===========================================================
     SKYLINE
     =========================================================== */
  .sky{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;gap:16px;padding:0 18px 76px}
  .bldg{position:relative;width:62px;border-radius:5px 5px 0 0;background:linear-gradient(180deg,#0c1326,#070b18);
    border:2px solid #1b2747;border-bottom:0;display:grid;grid-auto-rows:1fr;gap:3px;padding:9px 8px;cursor:pointer;transition:.2s}
  .bldg:hover{transform:translateY(-3px)}
  .floorlights{display:flex;gap:3px}
  .pane{flex:1;border-radius:1px;background:#0a1224}
  .pane.lit{background:radial-gradient(circle at 50% 40%,#fff3cf,#f4b65e);box-shadow:0 0 5px rgba(255,196,92,.7)}
  .bldg .blabel{position:absolute;bottom:-34px;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-size:9px;font-weight:800;letter-spacing:.05em;color:#cdd9ff;text-align:center}
  .bldg .blabel small{display:block;color:var(--dim);font-weight:600;font-size:8px;margin-top:2px}
  .bldg.active{border-color:var(--accent);box-shadow:0 0 24px -4px var(--accent)}
  .bldg.locked{opacity:.4}
  .bldg .lock{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px}
  .ground{position:absolute;left:0;right:0;bottom:70px;height:2px;background:linear-gradient(90deg,transparent,#33415f,transparent)}

  /* ---------- CTA bar ---------- */
  .cta{position:absolute;left:0;right:0;bottom:0;z-index:9;padding:12px 14px;
    background:linear-gradient(to top,#04060c 72%,transparent);display:flex;gap:8px;align-items:stretch}
  .cta .note{position:absolute;top:-2px;left:0;right:0;text-align:center;font-size:9px;color:#5fd08a;letter-spacing:.1em;text-transform:uppercase}
  .btn{flex:1;border:0;border-radius:11px;font:inherit;font-weight:800;font-size:13px;padding:13px 8px;cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--edge);color:var(--dim);flex:0 0 auto;padding:13px 14px}
  .btn.replay{background:#16203a;color:#cdd9ff;flex:0 0 auto;padding:13px 16px}
  .btn.next{background:linear-gradient(180deg,#22c55e,#16a34a);color:#04140a;box-shadow:0 0 18px rgba(34,197,94,.45)}

  /* ===========================================================
     PIXEL skin
     =========================================================== */
  .pixel{font-family:'Press Start 2P',monospace}
  .pixel .wordmark{font-size:9px;letter-spacing:.04em}
  .pixel .keychip{font-size:7px;border-radius:0}
  .pixel .neon-sky{background:linear-gradient(180deg,#1c1140 0%,#3a1a52 45%,#6a2350 75%,#8a3a3a 100%)}
  .pixel .stars{background-image:
    radial-gradient(2px 2px at 20% 22%,#fff,transparent),
    radial-gradient(2px 2px at 72% 14%,#ffd,transparent),
    radial-gradient(2px 2px at 86% 34%,#fff,transparent);opacity:.9}
  .pixel .moon{border-radius:0;box-shadow:0 0 0 4px rgba(253,246,227,.15)}
  .pixel .nameplate .name{font-size:11px;letter-spacing:.02em;text-shadow:2px 2px 0 var(--accent)}
  .pixel .nameplate .sub{font-size:7px}
  .pixel .building{filter:none}
  .pixel .roof{border-radius:0;border-width:3px;background:#2a1f44}
  .pixel .roof::before{border-radius:0;border-width:3px;background:#2a1f44}
  .pixel .tower{border-width:3px;background:#241a3a}
  .pixel .win{border-radius:0;border:2px solid #110a22;box-shadow:none!important}
  .pixel .win::before{background:
    linear-gradient(90deg,transparent calc(50% - 1px),#110a22 calc(50% - 1px),#110a22 calc(50% + 1px),transparent calc(50% + 1px)),
    linear-gradient(180deg,transparent calc(50% - 1px),#110a22 calc(50% - 1px),#110a22 calc(50% + 1px),transparent calc(50% + 1px))}
  .pixel .floor.locked .win{background:#12183a}
  .pixel .floor.done .win{background:#ffd86b;box-shadow:none!important}
  .pixel .floor.done .win.coolwin{background:#9fc3ff}
  .pixel .floor.done .win.dimwin{background:#d9a24a}
  .pixel .floor.done .win.offwin{background:#12183a}
  .pixel .floor.current .win{background:var(--accent);box-shadow:none!important;animation:none}
  .pixel .floor.current::after{border-radius:0;font-size:7px;box-shadow:none}
  .pixel .ledge{font-size:7px}
  .pixel .keyflag{border-radius:0;font-size:7px;box-shadow:none}
  .pixel .lobby{border-radius:0;border-width:3px;background:#241a3a}
  .pixel .door{border-radius:0;background:#ffd86b;box-shadow:none}
  .pixel .awning{border-radius:0}
  .pixel .elev .name{font-size:11px;text-shadow:2px 2px 0 var(--accent)}
  .pixel .elev .sub{font-size:7px}
  .pixel .panel{border-radius:0;border-width:3px;box-shadow:4px 4px 0 #000}
  .pixel .readout .big{font-size:44px;text-shadow:3px 3px 0 var(--accent)}
  .pixel .floorword{font-size:8px}
  .pixel .dot{border-radius:0;box-shadow:none!important}
  .pixel .ladder{font-size:8px}.pixel .ladder .lrow.cur{font-size:11px}
  .pixel .progressmeter{border-radius:0;height:8px;border:1px solid #000}.pixel .progressmeter i{box-shadow:none!important}
  .pixel .bldg{border-radius:0;border-width:3px;background:#241a3a}
  .pixel .pane{border-radius:0}.pixel .pane.lit{background:#ffd86b;box-shadow:none!important}
  .pixel .bldg .blabel{font-size:7px}.pixel .bldg .blabel small{font-size:6px}
  .pixel .bldg.active{box-shadow:3px 3px 0 var(--accent)}
  .pixel .btn{border-radius:0;font-size:9px;box-shadow:3px 3px 0 #000}
  .pixel .caption{font-size:8px}
</style>
</head>
<body>
  <div class="deck">
    <div class="seg" id="vibeSeg"><span class="lbl">Vibe</span>
      <button data-vibe="neon" class="on">Neon</button>
      <button data-vibe="pixel">Pixel-art</button></div>
    <div class="seg" id="viewSeg"><span class="lbl">View</span>
      <button data-view="current" class="on">Current Position</button>
      <button data-view="skyline">Skyline</button></div>
    <div class="seg" id="perspSeg"><span class="lbl">Inside</span>
      <button data-persp="facade" class="on">Facade</button>
      <button data-persp="elevator">Elevator</button></div>
  </div>

  <div class="phone" id="phone">
    <div class="topbar"><span class="wordmark">GAP&nbsp;CITY</span><span class="keychip">🔑 2 keys</span></div>
    <div class="stage" id="stage"></div>
  </div>

<script>
const BUILDINGS = [
  { key:'classic',    name:'THE CLASSIC', floors:45, accent:'#38bdf8', progress:23, unlocked:true,  keysAt:{9:'CHROMATIC',15:'SEQUENTIAL'} },
  { key:'chromatic',  name:'CHROMATIC',   floors:38, accent:'#e879f9', progress:6,  unlocked:true,  keyFrom:'The Classic · 9',  keysAt:{12:'GLIMPSE'} },
  { key:'sequential', name:'SEQUENTIAL',  floors:44, accent:'#fbbf24', progress:0,  unlocked:false, keyFrom:'The Classic · 15' },
  { key:'glimpse',    name:'GLIMPSE',     floors:51, accent:'#34d399', progress:0,  unlocked:false, keyFrom:'Chromatic · 12' },
];
let state = { vibe:'neon', view:'current', persp:'facade', active:'classic' };
const stage = document.getElementById('stage');
const phone = document.getElementById('phone');
const bldg = () => BUILDINGS.find(b=>b.key===state.active);

// deterministic per-window variation so lit floors look lived-in
function winClass(floor, idx){
  const h = (floor*7 + idx*13) % 10;
  if(h===0) return 'offwin';       // a dark window on a lit floor
  if(h<=2)  return 'coolwin';      // a TV-blue glow
  if(h<=4)  return 'dimwin';       // a dimmer warm
  return '';                       // standard warm
}

function ctaBar(){
  return `<div class="cta"><span class="note">▲ when you finish a floor</span>
    <button class="btn ghost">Exit</button>
    <button class="btn replay">↺ Replay</button>
    <button class="btn next">Next Floor →</button></div>`;
}

function facade(){
  const b = bldg(); const cur = b.progress + 1;
  let rows = '';
  for(let f=b.floors; f>=1; f--){
    const done = f <= b.progress, isCur = f === cur;
    const cls = isCur ? 'current' : done ? 'done' : 'locked';
    const wins = Array.from({length:4}).map((_,i)=>`<span class="win ${done&&!isCur?winClass(f,i):''}"></span>`).join('');
    const keyHere = b.keysAt && b.keysAt[f];
    const keyflag = keyHere ? `<span class="keyflag">🔑 ${keyHere} KEY</span>` : '';
    rows += `<div class="floor ${cls}">${keyflag}<span class="ledge">${String(f).padStart(2,'0')}</span>
      <div class="winrow">${wins}</div></div>`;
  }
  return `<div class="neon-sky"></div><div class="stars"></div><div class="moon"></div>
    <div class="nameplate" style="--accent:${b.accent}">
      <div class="name">${b.name}</div><div class="sub">${b.progress} / ${b.floors} floors lit</div></div>
    <div class="facade-scroll">
      <div class="building" style="--accent:${b.accent}">
        <div class="roof"><span class="antenna"></span></div>
        <div class="tower">${rows}</div>
        <div class="lobby"><span class="awning"></span><span class="door"></span><span class="streetline"></span></div>
      </div>
    </div>${ctaBar()}`;
}

function elevator(){
  const b = bldg(); const cur = b.progress + 1;
  const dots = Array.from({length:b.floors}).map((_,i)=>{
    const f=i+1, c = f===cur?'cur':f<=b.progress?'done':''; return `<span class="dot ${c}"></span>`; }).join('');
  const ladderRows = [cur+1, cur, cur-1].filter(f=>f>=1&&f<=b.floors).map(f=>{
    const chev = f===cur?'<span class="chev">▶</span>':'';
    const lab = f>cur?'locked':f<cur?'done':''; const c=f===cur?'cur':'';
    return `<div class="lrow ${c}">${chev} FLOOR ${String(f).padStart(2,'0')} ${lab?`· ${lab}`:''}</div>`; }).join('');
  const pct = Math.round(b.progress/b.floors*100);
  return `<div class="neon-sky"></div><div class="stars"></div><div class="moon"></div>
    <div class="elev" style="--accent:${b.accent}">
      <div class="name">${b.name}</div><div class="sub">key ✓ · entered building</div>
      <div class="panel">
        <div class="readout"><span class="big">${String(cur).padStart(2,'0')}</span><span class="of">/ ${b.floors}</span></div>
        <div class="floorword">current floor</div>
        <div class="ladder">${ladderRows}</div>
        <div class="progressmeter"><i style="width:${pct}%"></i></div>
        <div class="strip">${dots}</div>
      </div></div>${ctaBar()}`;
}

function skyline(){
  const maxF = Math.max(...BUILDINGS.map(b=>b.floors));
  const cols = BUILDINGS.map(b=>{
    const h = 130 + (b.floors/maxF)*340;
    const rooms = Array.from({length:b.floors}).map((_,i)=>{
      const lit = (i+1) <= b.progress;
      return `<div class="floorlights"><span class="pane ${lit?'lit':''}"></span><span class="pane ${lit?'lit':''}"></span></div>`;
    }).reverse().join('');
    const active = b.key===state.active ? 'active':'';
    const locked = !b.unlocked ? 'locked':'';
    const lock = !b.unlocked ? `<span class="lock">🔒</span>` : '';
    const sub = b.unlocked ? `${b.progress}/${b.floors}` : `🔑 ${b.keyFrom}`;
    return `<div class="bldg ${active} ${locked}" data-enter="${b.key}" style="--accent:${b.accent};height:${h}px">
      ${rooms}${lock}<span class="blabel">${b.name}<small>${sub}</small></span></div>`;
  }).join('');
  return `<div class="neon-sky"></div><div class="stars"></div><div class="moon"></div><div class="ground"></div>
    <div class="sky">${cols}</div>
    <div class="caption">Tap a building to enter · lit windows = floors cleared</div>`;
}

function render(){
  phone.classList.toggle('pixel', state.vibe==='pixel');
  const ps = document.getElementById('perspSeg');
  ps.style.opacity = state.view==='current'?1:.35; ps.style.pointerEvents = state.view==='current'?'auto':'none';
  if(state.view==='skyline') stage.innerHTML = skyline();
  else if(state.persp==='elevator') stage.innerHTML = elevator();
  else stage.innerHTML = facade();
  const cur = stage.querySelector('.floor.current'); if(cur) cur.scrollIntoView({block:'center'});
  stage.querySelectorAll('[data-enter]').forEach(el=>el.addEventListener('click',()=>{
    const b = BUILDINGS.find(x=>x.key===el.dataset.enter); if(!b.unlocked) return;
    state.active = el.dataset.enter; state.view='current';
    document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.toggle('on',x.dataset.view==='current'));
    render();
  }));
}

['vibe','view','persp'].forEach(k=>{
  document.getElementById(k+'Seg').addEventListener('click',e=>{
    const v = e.target.dataset[k]; if(!v) return; state[k]=v;
    e.currentTarget.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===e.target)); render();
  });
});
render();
</script>
</body>
</html>

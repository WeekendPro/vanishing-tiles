<svg xmlns="http://www.w3.org/2000/svg" width="900" height="880" viewBox="0 0 900 880" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#13131f"/>
      <stop offset="60%" stop-color="#06060B"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="36%" r="75%">
      <stop offset="52%" stop-color="#0E0E16"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="cyan" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#28F0FF" flood-opacity="0.85"/>
    </filter>
    <filter id="mag" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FF2D9B" flood-opacity="0.9"/>
    </filter>
    <filter id="lime" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#B6FF3C" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="900" height="880" fill="url(#bg)"/>
  <text x="48" y="46" fill="#EAEAF2" font-size="24" font-weight="700">Working title: <tspan fill="#28F0FF">Vanishing Shapes</tspan></text>
  <text x="48" y="72" fill="#8A8AA0" font-size="13">Afterglow look · new name on the two first-impression screens · the motif = gap shapes that bloom then vanish</text>

  <!-- ============ AUTH PHONE ============ -->
  <text x="250" y="104" fill="#4A4A5C" font-size="11" letter-spacing="2" font-weight="700" text-anchor="middle">AUTH / SIGN-IN</text>
  <rect x="70" y="116" width="360" height="740" rx="34" fill="url(#vig)" stroke="#1a1a26"/>

  <!-- vanishing-shapes motif (two tetromino clusters: lit=bloom, dim=decaying) -->
  <g>
    <!-- col x: 213,232,251,270 ; row y:158,177,196,215 ; cell 16 -->
    <rect x="232" y="158" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
    <rect x="251" y="158" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
    <rect x="213" y="177" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
    <rect x="232" y="177" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
    <rect x="251" y="196" width="16" height="16" rx="3" fill="#3a1b2e"/>
    <rect x="232" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
    <rect x="251" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
    <rect x="270" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
  </g>

  <!-- wordmark -->
  <g font-family="'Courier New',monospace" font-weight="700" letter-spacing="2" text-anchor="middle">
    <text x="250" y="300" font-size="30" fill="#ffffff" filter="url(#cyan)">VANISHING</text>
    <text x="250" y="336" font-size="30" fill="#28F0FF" filter="url(#cyan)">SHAPES</text>
  </g>
  <text x="250" y="366" fill="#FF2D9B" font-size="10" letter-spacing="2.5" text-anchor="middle" filter="url(#mag)">MEMORIZE THE GAPS. FILL THEM FAST.</text>

  <!-- email field -->
  <text x="116" y="402" fill="#4A4A5C" font-size="9" letter-spacing="1">EMAIL</text>
  <rect x="100" y="408" width="300" height="46" rx="11" fill="#0a0a12" stroke="#ffffff22"/>
  <text x="116" y="436" fill="#4A4A5C" font-size="13">you@email.com</text>
  <!-- password field (focused) -->
  <text x="116" y="470" fill="#4A4A5C" font-size="9" letter-spacing="1">PASSWORD</text>
  <rect x="100" y="476" width="300" height="46" rx="11" fill="#0a0a12" stroke="#28F0FF" stroke-width="1.4"/>
  <text x="116" y="504" fill="#EAEAF2" font-size="15">••••••••</text>
  <!-- Enter -->
  <rect x="100" y="536" width="300" height="46" rx="11" fill="#15151F" stroke="#28F0FF" stroke-width="2"/>
  <text x="250" y="565" fill="#28F0FF" font-size="13" letter-spacing="2" text-anchor="middle">ENTER →</text>
  <!-- Create account -->
  <rect x="100" y="590" width="300" height="42" rx="11" fill="#15151F" stroke="#ffffff1f"/>
  <text x="250" y="616" fill="#8A8AA0" font-size="12" text-anchor="middle">Create account</text>
  <!-- divider -->
  <line x1="100" y1="654" x2="232" y2="654" stroke="#ffffff1f"/>
  <text x="250" y="658" fill="#4A4A5C" font-size="10" text-anchor="middle">OR</text>
  <line x1="268" y1="654" x2="400" y2="654" stroke="#ffffff1f"/>
  <!-- google -->
  <rect x="100" y="672" width="300" height="46" rx="11" fill="#15151F" stroke="#ffffff33" stroke-width="2"/>
  <circle cx="170" cy="695" r="8" fill="#4285F4"/>
  <text x="252" y="700" fill="#EAEAF2" font-size="12" text-anchor="middle">Continue with Google</text>
  <!-- guest -->
  <text x="250" y="746" fill="#8A8AA0" font-size="12" text-anchor="middle">Just visiting? <tspan fill="#28F0FF">Continue as guest</tspan></text>

  <!-- ============ HOME PHONE ============ -->
  <text x="650" y="104" fill="#4A4A5C" font-size="11" letter-spacing="2" font-weight="700" text-anchor="middle">HOME / LANDING</text>
  <rect x="470" y="116" width="360" height="740" rx="34" fill="url(#vig)" stroke="#1a1a26"/>

  <!-- hamburger -->
  <rect x="760" y="136" width="40" height="40" rx="12" fill="none" stroke="#ffffff22"/>
  <g stroke="#8A8AA0" stroke-width="2"><line x1="771" y1="150" x2="789" y2="150"/><line x1="771" y1="156" x2="789" y2="156"/><line x1="771" y1="162" x2="789" y2="162"/></g>

  <!-- motif -->
  <g>
    <rect x="632" y="158" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
    <rect x="651" y="158" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
    <rect x="613" y="177" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
    <rect x="632" y="177" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
    <rect x="651" y="196" width="16" height="16" rx="3" fill="#3a1b2e"/>
    <rect x="632" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
    <rect x="651" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
    <rect x="670" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
  </g>

  <!-- wordmark left-aligned -->
  <g font-family="'Courier New',monospace" font-weight="700" letter-spacing="2">
    <text x="500" y="300" font-size="33" fill="#ffffff" filter="url(#cyan)">VANISHING</text>
    <text x="500" y="338" font-size="33" fill="#28F0FF" filter="url(#cyan)">SHAPES</text>
  </g>
  <text x="500" y="368" fill="#FF2D9B" font-size="10" letter-spacing="2.5" filter="url(#mag)">A MEMORY GAME</text>

  <!-- play -->
  <rect x="500" y="694" width="300" height="56" rx="12" fill="#15151F" stroke="#B6FF3C" stroke-width="2" filter="url(#lime)"/>
  <text x="650" y="729" fill="#B6FF3C" font-family="'Courier New',monospace" font-size="15" letter-spacing="2" text-anchor="middle">PLAY</text>
  <!-- experimental -->
  <rect x="500" y="762" width="300" height="56" rx="12" fill="#15151F" stroke="#28F0FF" stroke-width="2"/>
  <text x="520" y="795" fill="#28F0FF" font-family="'Courier New',monospace" font-size="11" letter-spacing="1">EXPERIMENTAL MODES</text>
  <text x="784" y="797" fill="#28F0FF" font-size="20" text-anchor="middle">›</text>
  <!-- footnote -->
  <text x="650" y="840" fill="#4A4A5C" font-size="12" text-anchor="middle">4 more ways to play, behind one tap</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="870" viewBox="0 0 1260 870" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#13131f"/><stop offset="60%" stop-color="#06060B"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="34%" r="75%">
      <stop offset="52%" stop-color="#0E0E16"/><stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="cyan" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#28F0FF" flood-opacity="0.85"/></filter>
    <filter id="mag" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#FF2D9B" flood-opacity="0.9"/></filter>
    <filter id="lime" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#B6FF3C" flood-opacity="0.6"/></filter>
    <filter id="smear" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <rect width="1260" height="870" fill="url(#bg)"/>
  <text x="40" y="46" fill="#EAEAF2" font-size="24" font-weight="700">Working title: <tspan fill="#28F0FF">Vanishing Tiles</tspan></text>
  <text x="40" y="72" fill="#8A8AA0" font-size="13">Auth · Home · the Infinite-Stagger countdown (Afterglow-smear numeral). Same look as before, name swapped to Vanishing Tiles.</text>

  <!-- ===================== AUTH ===================== -->
  <text x="210" y="104" fill="#4A4A5C" font-size="11" letter-spacing="2" font-weight="700" text-anchor="middle">AUTH / SIGN-IN</text>
  <rect x="30" y="116" width="360" height="720" rx="34" fill="url(#vig)" stroke="#1a1a26"/>
  <!-- motif -->
  <rect x="192" y="158" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
  <rect x="211" y="158" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
  <rect x="173" y="177" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
  <rect x="192" y="177" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
  <rect x="211" y="196" width="16" height="16" rx="3" fill="#3a1b2e"/>
  <rect x="192" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
  <rect x="211" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
  <rect x="230" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
  <!-- wordmark -->
  <g font-family="'Courier New',monospace" font-weight="700" letter-spacing="2" text-anchor="middle">
    <text x="210" y="300" font-size="27" fill="#ffffff" filter="url(#cyan)">VANISHING</text>
    <text x="210" y="334" font-size="27" fill="#28F0FF" filter="url(#cyan)">TILES</text>
  </g>
  <text x="210" y="364" fill="#FF2D9B" font-size="10" letter-spacing="2.5" text-anchor="middle" filter="url(#mag)">A MEMORY GAME</text>
  <!-- form -->
  <text x="76" y="402" fill="#4A4A5C" font-size="9" letter-spacing="1">EMAIL</text>
  <rect x="60" y="408" width="300" height="44" rx="11" fill="#0a0a12" stroke="#ffffff22"/>
  <text x="76" y="435" fill="#4A4A5C" font-size="13">you@email.com</text>
  <text x="76" y="470" fill="#4A4A5C" font-size="9" letter-spacing="1">PASSWORD</text>
  <rect x="60" y="476" width="300" height="44" rx="11" fill="#0a0a12" stroke="#28F0FF" stroke-width="1.4"/>
  <text x="76" y="503" fill="#EAEAF2" font-size="15">••••••••</text>
  <rect x="60" y="534" width="300" height="44" rx="11" fill="#15151F" stroke="#28F0FF" stroke-width="2"/>
  <text x="210" y="562" fill="#28F0FF" font-size="13" letter-spacing="2" text-anchor="middle">ENTER →</text>
  <rect x="60" y="586" width="300" height="40" rx="11" fill="#15151F" stroke="#ffffff1f"/>
  <text x="210" y="611" fill="#8A8AA0" font-size="12" text-anchor="middle">Create account</text>
  <line x1="60" y1="648" x2="192" y2="648" stroke="#ffffff1f"/>
  <text x="210" y="652" fill="#4A4A5C" font-size="10" text-anchor="middle">OR</text>
  <line x1="228" y1="648" x2="360" y2="648" stroke="#ffffff1f"/>
  <rect x="60" y="666" width="300" height="44" rx="11" fill="#15151F" stroke="#ffffff33" stroke-width="2"/>
  <circle cx="130" cy="688" r="8" fill="#4285F4"/>
  <text x="212" y="693" fill="#EAEAF2" font-size="12" text-anchor="middle">Continue with Google</text>
  <text x="210" y="740" fill="#8A8AA0" font-size="12" text-anchor="middle">Just visiting? <tspan fill="#28F0FF">Continue as guest</tspan></text>

  <!-- ===================== HOME ===================== -->
  <text x="630" y="104" fill="#4A4A5C" font-size="11" letter-spacing="2" font-weight="700" text-anchor="middle">HOME / LANDING</text>
  <rect x="450" y="116" width="360" height="720" rx="34" fill="url(#vig)" stroke="#1a1a26"/>
  <rect x="752" y="136" width="38" height="38" rx="12" fill="none" stroke="#ffffff22"/>
  <g stroke="#8A8AA0" stroke-width="2"><line x1="762" y1="149" x2="780" y2="149"/><line x1="762" y1="155" x2="780" y2="155"/><line x1="762" y1="161" x2="780" y2="161"/></g>
  <!-- motif left-aligned -->
  <rect x="499" y="158" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
  <rect x="518" y="158" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
  <rect x="480" y="177" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
  <rect x="499" y="177" width="16" height="16" rx="3" fill="#FF2D9B" filter="url(#mag)"/>
  <rect x="518" y="196" width="16" height="16" rx="3" fill="#3a1b2e"/>
  <rect x="499" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
  <rect x="518" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
  <rect x="537" y="215" width="16" height="16" rx="3" fill="#3a1b2e"/>
  <g font-family="'Courier New',monospace" font-weight="700" letter-spacing="2">
    <text x="480" y="300" font-size="31" fill="#ffffff" filter="url(#cyan)">VANISHING</text>
    <text x="480" y="338" font-size="31" fill="#28F0FF" filter="url(#cyan)">TILES</text>
  </g>
  <text x="480" y="368" fill="#FF2D9B" font-size="10" letter-spacing="2.5" filter="url(#mag)">A MEMORY GAME</text>
  <rect x="480" y="700" width="300" height="54" rx="12" fill="#15151F" stroke="#B6FF3C" stroke-width="2" filter="url(#lime)"/>
  <text x="630" y="734" fill="#B6FF3C" font-family="'Courier New',monospace" font-size="15" letter-spacing="2" text-anchor="middle">PLAY</text>
  <rect x="480" y="762" width="300" height="54" rx="12" fill="#15151F" stroke="#28F0FF" stroke-width="2"/>
  <text x="500" y="795" fill="#28F0FF" font-family="'Courier New',monospace" font-size="11" letter-spacing="1">EXPERIMENTAL MODES</text>
  <text x="764" y="797" fill="#28F0FF" font-size="20" text-anchor="middle">›</text>

  <!-- ===================== COUNTDOWN ===================== -->
  <text x="1050" y="104" fill="#4A4A5C" font-size="11" letter-spacing="2" font-weight="700" text-anchor="middle">COUNTDOWN · STAGGER</text>
  <rect x="870" y="116" width="360" height="720" rx="34" fill="url(#vig)" stroke="#1a1a26"/>
  <text x="1050" y="398" fill="#28F0FF" font-family="'Courier New',monospace" font-size="12" letter-spacing="1.5" text-anchor="middle" filter="url(#cyan)">STAGGERED VANISHING TILES</text>
  <!-- numeral: faint smear ghost behind + sharp glowing 3 -->
  <text x="1058" y="540" fill="#28F0FF" opacity="0.28" font-family="'Courier New',monospace" font-weight="700" font-size="150" text-anchor="middle" filter="url(#smear)">3</text>
  <text x="1050" y="528" fill="#28F0FF" font-family="'Courier New',monospace" font-weight="700" font-size="130" text-anchor="middle" filter="url(#cyan)">3</text>
  <text x="1050" y="600" fill="#8A8AA0" font-size="12" letter-spacing="3" text-anchor="middle">MEMORIZE</text>
  <!-- faint outgoing ghosts of 2 / 1 to suggest the 3-2-1 smear sequence -->
  <text x="1050" y="690" fill="#28F0FF" opacity="0.12" font-family="'Courier New',monospace" font-weight="700" font-size="40" text-anchor="middle">2</text>
  <text x="1095" y="700" fill="#28F0FF" opacity="0.07" font-family="'Courier New',monospace" font-weight="700" font-size="30" text-anchor="middle">1</text>
</svg>

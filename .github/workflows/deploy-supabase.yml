# Deploys the Supabase backend (database migrations + edge functions) to the
# linked production project whenever backend files land on main. This prevents
# the kind of drift that left production three migrations behind the frontend.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  - a personal access token from https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   - the database password for the linked project
#
# The project ref below is not secret (it appears in the project URL); update it
# if the linked project changes.
name: Deploy Supabase backend

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch: {}

# Never run two backend deploys at once, and never cancel one mid-migration.
concurrency:
  group: supabase-deploy
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: wvdugxpjovvojxcpqfqa

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link the production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy
